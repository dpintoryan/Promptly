# ============================================================
#  railway.toml  –  Railway deployment configuration
#  This file tells Railway how to build and run the backend.
# ============================================================

[build]
builder = "NIXPACKS"       # Railway auto-detects Node.js — no Dockerfile needed

[deploy]
startCommand = "npm start" # Runs: node server.js
healthcheckPath = "/health" # Railway pings this to confirm the app is up
healthcheckTimeout = 30     # Seconds to wait for a healthy response
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
